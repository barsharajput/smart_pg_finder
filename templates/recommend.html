{% extends "base.html" %}
{% block content %}

<style>
.recommend-container {
    padding: 30px 40px;
}

/* HEADER */
.recommend-header {
    text-align: center;
    margin-bottom: 30px;
}

.recommend-header h2 {
    margin-bottom: 10px;
}

/* GRID */
.recommend-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
}

/* CARD */
.recommend-card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    transition: 0.3s;
    position: relative;
}

.recommend-card:hover {
    transform: translateY(-5px);
}

/* IMAGE */
.recommend-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* INFO */
.recommend-info {
    padding: 15px;
}

.recommend-info h3 {
    margin: 0;
}

.location {
    color: gray;
    font-size: 14px;
}

.price {
    font-weight: bold;
    margin: 8px 0;
}

/* TAG */
.tag {
    background: linear-gradient(45deg, #ff9800, #ff5722);
    color: white;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    position: absolute;
    top: 10px;
    left: 10px;
}

/* BUTTON */
.book-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 15px;
    background: #00bcd4;
    color: white;
    border-radius: 6px;
    text-decoration: none;
}
</style>

<div class="recommend-container">

    <div class="recommend-header">
        <h2>✨ Recommended PGs</h2>
        <p>Based on your preferences ❤️</p>
    </div>

    <div class="recommend-grid">

        {% for pg in pgs %}
        <div class="recommend-card">

            <span class="tag">⭐ Recommended</span>

            <img src="{{ url_for('static', filename='uploads/' + (pg.image if pg.image else 'default.jpg')) }}">

            <div class="recommend-info">
                <h3>{{ pg.name }}</h3>
                <p class="location">📍 {{ pg.location }}</p>
                <p class="price">₹ {{ pg.rent }}/month</p>

                <a href="/book/{{ pg.id }}" class="book-btn">Book</a>
            </div>

        </div>
        {% endfor %}

{% if pgs|length == 0 %}
    <h2 style="text-align:center; margin-top:50px;">
        No Recommendations Available 😶
    </h2>
{% endif %}

    </div>

</div>

{% endblock %}
