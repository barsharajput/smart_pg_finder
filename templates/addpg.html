{% extends "base.html" %}
{% block content %}

<style>
body {
    background: #f4f7fb;
    font-family: 'Segoe UI', sans-serif;
}

/* CONTAINER */
.addpg-container {
    max-width: 500px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* TITLE */
.addpg-container h2 {
    text-align: center;
    margin-bottom: 25px;
}

/* INPUT */
.addpg-container input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
    transition: 0.3s;
}

.addpg-container input:focus {
    border-color: #0072ff;
    outline: none;
    box-shadow: 0 0 5px rgba(0,114,255,0.2);
}

/* FILE INPUT */
.file-box {
    border: 2px dashed #ccc;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
    margin-bottom: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.file-box:hover {
    border-color: #0072ff;
}

/* BUTTON */
.add-btn {
    width: 100%;
    padding: 12px;
    border: none;
    background: linear-gradient(45deg, #0072ff, #00c6ff);
    color: white;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.add-btn:hover {
    transform: scale(1.03);
}

/* UPLOAD BOX */
.upload-box {
    border: 2px dashed #ccc;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    transition: 0.3s;
    margin-bottom: 15px;
    background: #fafafa;
    position: relative;
}

.upload-box:hover {
    border-color: #0072ff;
    background: #f0f8ff;
}

/* HIDE DEFAULT INPUT */
.upload-box input {
    display: none;
}

/* LABEL */
.upload-label {
    cursor: pointer;
    color: #555;
    font-size: 14px;
}

/* IMAGE PREVIEW */
#preview {
    margin-top: 10px;
    max-width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
    display: none;
}

</style>

<div class="addpg-container">

    <h2>➕ Add New PG</h2>

    <form method="POST" enctype="multipart/form-data">

        <input type="text" name="name" placeholder="PG Name" required>

        <input type="text" name="location" placeholder="Location" required>

        <input type="number" name="rent" placeholder="Monthly Rent ₹" required>

        <!-- IMAGE -->
        <div class="upload-box">
    <label for="imageUpload" class="upload-label">
        📸 Click to upload PG Image
    </label>
    <input type="file" id="imageUpload" name="image" accept="image/*" required>

    <!-- Preview -->
    <img id="preview" src="#" alt="Preview">
</div>

        <button type="submit" class="add-btn">Add PG 🚀</button>

    </form>

</div>
<script>
document.getElementById("imageUpload").onchange = function (e) {
    const file = e.target.files[0];
    if (file) {
        const preview = document.getElementById("preview");
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
};
</script>
{% endblock %}
