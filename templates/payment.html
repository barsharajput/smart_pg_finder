{% extends "base.html" %}
{% block content %}

<style>
.payment-container {
    max-width: 420px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

/* OPTIONS */
.payment-options {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.option {
    flex: 1;
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    cursor: pointer;
}

.option.active {
    background: #0072ff;
    color: white;
}

/* INPUT */
.input-box {
    margin: 10px 0;
}

.input-box input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* QR */
.qr-box img {
    width: 150px;
}

/* BUTTON */
.pay-btn {
    margin-top: 15px;
    padding: 10px 20px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>

<div class="payment-container">

    <h2>💳 Complete Payment</h2>
    

    <h3 style="color:#28a745;">
    ₹ {{ amount }} /-
    </h3>

    <div class="payment-options">
        <div class="option active" onclick="showOption('upi', this)">📱 UPI</div>
        <div class="option" onclick="showOption('card', this)">💳 Card</div>
        <div class="option" onclick="showOption('qr', this)">📷 QR</div>
    </div>

    <form method="POST">

        <!-- UPI -->
        <div id="upi" class="pay-section">
            <div class="input-box">
                <input type="text" name="upi" placeholder="Enter UPI ID (example@upi)">
            </div>
        </div>

        <!-- CARD -->
        <div id="card" class="pay-section" style="display:none;">
            <div class="input-box">
                <input type="text" placeholder="Card Number">
            </div>
            <div class="input-box">
                <input type="text" placeholder="MM/YY">
            </div>
            <div class="input-box">
                <input type="text" placeholder="CVV">
            </div>
        </div>

        <!-- QR -->
        <div id="qr" class="pay-section" style="display:none;">
            <p>Scan & Pay</p>
            <div class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay">
            </div>
        </div>

        <button class="pay-btn">Pay ₹ {{ amount }}</button>

    </form>

</div>

<script>
function showOption(type, el) {

    // remove active
    document.querySelectorAll(".option").forEach(o => o.classList.remove("active"));
    el.classList.add("active");

    // hide all
    document.querySelectorAll(".pay-section").forEach(sec => sec.style.display = "none");

    // show selected
    document.getElementById(type).style.display = "block";
}
</script>

{% endblock %}
