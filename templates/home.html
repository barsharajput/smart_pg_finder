{% extends "base.html" %}
{% block content %}

<style>
.hero {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    text-align: center;
    padding: 80px 20px;
    border-radius: 15px;
    margin: 30px auto;
    width: 90%;
}

.hero h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.hero p {
    margin-bottom: 20px;
}

.search-box {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.search-box input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    width: 200px;
}

.search-box button {
    padding: 12px 20px;
    border: none;
    background: #0096ff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* FEATURES */
.features {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin: 40px auto;
    width: 90%;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 230px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
</style>

<!-- HERO -->
<div class="hero">
    <h1>Find Your Perfect PG</h1>
    <p>Discover best PG based on location and budget</p>

    <div class="search-box">
        <input type="text" placeholder="📍 Enter Location">
        <input type="text" placeholder="₹ Budget">
        <button>Search 🔍</button>
    </div>
</div>

<!-- FEATURES -->
<div class="features">

    <div class="card">
        <h2>🏠</h2>
        <h3>Verified PG</h3>
        <p>All listings are verified and trusted</p>
    </div>

    <div class="card">
        <h2>💰</h2>
        <h3>Affordable</h3>
        <p>Find PG within your budget easily</p>
    </div>

    <div class="card">
        <h2>📍</h2>
        <h3>Prime Locations</h3>
        <p>Best PGs in top cities</p>
    </div>

</div>

{% endblock %}
